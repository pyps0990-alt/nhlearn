  <script src="https://apis.google.com/js/api.js" async defer></script>

  <style>
    /* Inline critical CSS for the splash screen — prevents FOUC */
    body { margin: 0; background: #020617; }
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #020617;
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash h1 {
      font-size: 2rem; font-weight: 900;
      background: linear-gradient(135deg, #10B981, #34d399);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin: 0 0 12px;
    }
    #splash p { color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 600; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .splash-spinner {
      width: 28px; height: 28px; margin-top: 24px;
      border: 3px solid rgba(16,185,129,0.15);
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>

<body>
  <!-- Splash Screen — disappears once React mounts -->
  <div id="splash">
    <h1>GSAT Pro</h1>
    <p>正在載入學習夥伴…</p>
    <div class="splash-spinner"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Hide splash once React root renders
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>

</html>
