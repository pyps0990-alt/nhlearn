<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>英文單字學習</title>
  <link rel="stylesheet" href="teacher_vocab.css">
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <script>
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      const themeParam = urlParams.get('theme');
      if (themeParam === 'dark' || (themeParam === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        const localTheme = localStorage.getItem('nhsh-app-theme');
        if (localTheme === 'dark') document.documentElement.classList.add('dark');
      }
      const keyParam = urlParams.get('geminiKey');
      if (keyParam) localStorage.setItem('gsat_gemini_key', keyParam);
    })();
  </script>
</head>

<body>
  <!-- 頂部導覽列 -->
  <div class="global-header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <h1 id="currentNavTitle" style="font-size: 18px; font-weight: 900; margin: 0; color: var(--text-primary);">✏️ 記錄單字
      </h1>
      <select id="headerGradeSelect" class="header-grade-select" onchange="handleGradeChange(this.value)">
        <option value="G1">🎒 高一</option>
        <option value="G2">📘 高二</option>
        <option value="G3">🎓 高三</option>
      </select>
    </div>
    <div style="display: flex; gap: 8px;">
      <button id="adminShareBtn" class="admin-only-btn" onclick="toggleAdminView()" style="display:none;">👨‍🏫
        師長</button>
      <button class="settings-btn" onclick="openSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>
  </div>

  <!-- 反白查詢浮動按鈕 -->
  <button id="selectionTooltip" class="selection-tooltip" onclick="handleSelectionAdd()" style="display:none;">
    🔍 查詢並收錄
  </button>

  <div class="toast" id="toast"></div>

  <!-- AI Modal -->
  <div class="modal-overlay" id="aiModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">👨‍🏫 大考權威解析</span>
        <button class="modal-close" onclick="closeAiModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="aiLoading" style="display:none;" class="loading">
          <div class="spinner"></div><span style="margin-left: 12px; font-weight: 800; color: #a855f7;">AI
            專家解析中...</span>
        </div>
        <div id="aiContent" class="ai-result-content"></div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">系統設定</span>
        <button class="modal-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="modal-body">
        <div class="connection-status status-disconnected" id="connectionStatus">
          <span class="status-dot"></span>
          <span id="statusText">正在連線...</span>
        </div>
        <div class="input-group">
          <label>Google Gemini API Key</label>
          <input type="password" class="input-field" id="geminiKeyInput" placeholder="在此輸入 AI 金鑰...">
          <p style="font-size: 11px; margin-top: 8px; color: #64748b; font-weight: 800;">
            <a href="https://aistudio.google.com/app/apikey" target="_blank"
              style="color: #10b981; text-decoration: none;">✨ 建立免費 AI 金鑰</a>
          </p>
        </div>
        <div class="input-group">
          <label>雲端同步 URL</label>
          <input type="text" class="input-field" id="apiUrlInput" placeholder="https://script.google.com/macros/s/...">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 記錄頁面 -->
  <div class="page active" id="recordPage">
    <div class="card">
      <div class="card-title">✨ 收錄新單字</div>
      <div class="input-group">
        <label>英文單字</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" class="input-field" id="wordInput" placeholder="輸入英文...">
          <!-- 朗讀按鈕 -->
          <button class="btn btn-tts" onclick="speakWord(document.getElementById('wordInput').value)"
            title="朗讀發音">🗣️</button>
          <button class="btn btn-ai" onclick="autoFillWithAI()">AI 輔助</button>
        </div>
      </div>
      <div class="input-group">
        <label>中文意思 (支援多詞性)</label>
        <textarea class="input-field" id="chineseInput" placeholder="例如: n. 蘋果; adj. 蘋果的..." rows="2"
          style="resize:none;"></textarea>
      </div>
      <div class="input-group">
        <label>實用例句</label>
        <textarea class="input-field" id="exampleInput" placeholder="AI 自動造句或手動輸入..." rows="2"
          style="resize:none;"></textarea>
      </div>
      <div style="display: flex; gap: 12px;">
        <div class="input-group" style="flex: 1;">
          <label>主要詞性</label>
          <select class="select-field" id="posInput">
            <option value="">選填</option>
            <option value="n.">n.</option>
            <option value="v.">v.</option>
            <option value="adj.">adj.</option>
            <option value="adv.">adv.</option>
            <option value="prep.">prep.</option>
            <option value="conj.">conj.</option>
            <option value="phr.">phr.</option>
          </select>
        </div>
        <div class="input-group" style="flex: 1;">
          <label>學測級別</label>
          <select class="select-field" id="levelInput">
            <option value="">選填</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">儲存單字卡</button>
    </div>
  </div>

  <!-- 大考與複習頁面 -->
  <div class="page" id="examPage">
    <div class="card">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="examSearchInput" placeholder="在此級別中搜尋..."
          onkeyup="handleExamSearch(event)">
      </div>
      <div class="level-selector">
        <button class="level-btn" data-level="1">L1</button>
        <button class="level-btn" data-level="2">L2</button>
        <button class="level-btn" data-level="3">L3</button>
        <button class="level-btn" data-level="4">L4</button>
        <button class="level-btn" data-level="5">L5</button>
        <button class="level-btn" data-level="6">L6</button>
      </div>
    </div>
    <div id="examContent">
      <div class="empty-state">🎯 請選擇級別</div>
    </div>
  </div>

  <div class="page" id="historyPage">
    <div class="tabs">
      <button class="tab active" data-tab="recent" onclick="switchHistoryTab('recent')">最近紀錄</button>
      <button class="tab" data-tab="review" onclick="switchHistoryTab('review')">單字複習</button>
    </div>
    <div id="recentTab">
      <div id="recentRecords" class="loading">
        <div class="spinner"></div>
      </div>
    </div>
    <div id="reviewTab" style="display:none;">
      <div class="card">
        <div class="input-group" style="margin-bottom:12px;">
          <label>測驗範圍</label>
          <select class="select-field" id="quizScopeSelect">
            <option value="personal">👤 僅限個人收藏</option>
            <option value="shared">🌐 包含師長共享單字</option>
          </select>
        </div>
        <div class="input-group" style="margin-bottom:0;">
          <label>題型選擇</label>
          <select class="select-field" id="quizModeSelect">
            <option value="meaning">📝 字義測驗</option>
            <option value="context">🎯 單字情境選擇</option>
            <option value="cloze">🧩 綜合測驗</option>
            <option value="reading">📖 閱讀理解</option>
          </select>
        </div>
      </div>
      <div id="quizContainer"></div>
      <button class="btn btn-primary" onclick="loadAiQuiz()">產生隨堂測驗</button>
    </div>
  </div>

  <!-- 底部導覽 -->
  <nav class="tab-bar">
    <button class="tab-item active" data-page="recordPage" onclick="switchPage('recordPage')"><span
        class="tab-icon">✏️</span><span class="tab-label">記錄</span></button>
    <button class="tab-item" data-page="examPage" onclick="switchPage('examPage')"><span class="tab-icon">📖</span><span
        class="tab-label">大考</span></button>
    <button class="tab-item" data-page="historyPage" onclick="switchPage('historyPage')"><span
        class="tab-icon">📋</span><span class="tab-label">複習</span></button>
  </nav>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">✏️ 編輯單字</span>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>英文單字</label>
          <input type="text" class="input-field" id="editWordInput">
        </div>
        <div class="input-group">
          <label>中文意思</label>
          <textarea class="input-field" id="editChineseInput" rows="2" style="resize:none;"></textarea>
        </div>
        <div class="input-group">
          <label>實用例句</label>
          <textarea class="input-field" id="editExampleInput" rows="2" style="resize:none;"></textarea>
        </div>
        <div style="display:flex; gap:12px;">
          <div class="input-group" style="flex:1;">
            <label>詞性</label>
            <select class="select-field" id="editPosInput">
              <option value="">選填</option>
              <option value="n.">n. 名詞</option>
              <option value="v.">v. 動詞</option>
              <option value="adj.">adj. 形容詞</option>
              <option value="adv.">adv. 副詞</option>
              <option value="prep.">prep. 介係詞</option>
              <option value="conj.">conj. 連接詞</option>
              <option value="phr.">phr.片語</option>
            </select>
          </div>
          <div class="input-group" style="flex:1;">
            <label>級別</label>
            <select class="select-field" id="editLevelInput">
              <option value="">選填</option>
              <option value="1">L1</option>
              <option value="2">L2</option>
              <option value="3">L3</option>
              <option value="4">L4</option>
              <option value="5">L5</option>
              <option value="6">L6</option>
            </select>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-danger" onclick="deleteRecord(_editingRecord?.serialNumber)">刪除</button>
          <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="teacher_vocab.js"></script>
  <script>
    function closeAiModal() { document.getElementById('aiModal').classList.remove('show'); }
  </script>
</body>

</html>
